    subheading: Policy version
    description: |
      This Privacy Policy was last updated on **1 July 2026**.

      We may revise this policy to reflect legal, technical, or business changes. Material updates will be posted on this page with a revised date. Continued use of our website after changes constitutes acknowledgment of the updated policy.
    contentNotes: |
      Requires solicitor review before production. Bump updatedAt on each solicitor-approved revision. Consider version history in CMS.
    seoNotes: |
      H2 privacy policy last updated. dateModified schema when published.
