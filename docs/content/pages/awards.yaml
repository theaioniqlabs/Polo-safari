      - entityType: timeline-event
        entityId: timeline-2025-eleven-years
      - entityType: timeline-event
        entityId: timeline-2025-inbound-vietnam
    contentNotes: |
      Vertical timeline component—year left, event right. Award years visually emphasised (2024, 2025). Link /about#how-we-started for founder narrative.
    seoNotes: |
      H2 polo safari history awards timeline. Year markers for long-tail queries.
    stockImage:
      keywords:
        - company timeline milestone infographic
        - travel business growth journey india
      orientation: landscape
      aspectRatio: "21:9"
      usage: background
    replacementNote: Timeline illustrated with Polo Safari archival photos per milestone year.

  - id: cta
    heading: Award-winning execution starts with a conversation
    subheading: Corporate, educational, family, and adventure programs from Ahmedabad
    description: |
      Recognition matters—but the real test is your next trip. Speak with our team about an offsite, field study, or family holiday backed by eleven years of delivery and Gujarat Tourism honours.
    cta:
      label: Contact Polo Safari
      href: /contact
    contentNotes: |
      Dual CTA: /corporate and /schools-colleges. Trust strip: MSME, GST, Verified & Authorized from company entity.
    seoNotes: |
      H2 plan trip polo safari ahmedabad. Conversion-focused close.
    stockImage:
      keywords:
        - corporate team celebration outdoor sunset
        - successful group travel happy moment
      orientation: landscape
      aspectRatio: "21:9"
      usage: background
    replacementNote: Polo Safari group celebration moment post-award-season corporate trip.
