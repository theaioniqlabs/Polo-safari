id: about
slug: about
route: /about
title: About
status: review
seo:
  title: About Polo Safari | Heritage Travel Since 2014
  metaDescription: Meet Chirag Shah and the Polo Safari team—Ahmedabad-founded experiential travel with authentic Polo Forest heritage, award-winning corporate and educational programs.
  slug: about
  primaryKeyword: about polo safari
  secondaryKeywords:
    - chirag shah polo safari founder
    - polo forest heritage tours
    - experiential travel ahmedabad
    - gujarat tourism award operator
  internalLinks:
    - label: Corporate Retreats
      href: /corporate
    - label: Schools & Colleges
      href: /schools-colleges
    - label: Awards & Recognition
      href: /awards
    - label: Polo Forest Tours
      href: /india
    - label: Contact Us
      href: /contact
  ctaSuggestions:
    - label: Request Corporate Proposal
      href: /corporate
