sections:
  - id: hero
    heading: Theme tour packages for every kind of traveller
    subheading: Nine pillars · One Ahmedabad team · PDF-confirmed destinations
    description: |
      Polo Safari organises travel around how you travel—not arbitrary geography. Corporate offsites, school field studies, family weekends, heritage walks at Polo Forest, adventure treks, wellness pauses, day picnics, and international escapes—each theme links to destinations, durations, and the right proposal path.
    cta:
      label: Compare Themes Below
      href: "#how-to-choose"
    contentNotes: |
      WF-THEME-HERO. Breadcrumb Home → Theme Tour Packages. Anchor jump to #how-to-choose or first theme section. Nine theme chips as quick nav linking to section anchors (anchorSlug from themes entity).
    seoNotes: |
      Single H1 themed tour packages india. Nine pillars listed in subheading. Primary keyword in first 80 words.
    stockImage:
      keywords:
        - themed travel experience collage india
        - diverse tour packages corporate family adventure
      orientation: landscape
      aspectRatio: "21:9"
      usage: hero
    replacementNote: Nine-theme mosaic using Polo Safari on-trip photography—one image per pillar when available.

