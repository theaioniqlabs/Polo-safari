sections:
  - id: hero
    heading: Moments from the field
    subheading: Corporate · Educational · Adventure · Heritage · International
    description: |
      A visual record of offsites, field studies, treks, heritage walks, and celebration moments—photography, drone perspectives, and highlight reels from Polo Safari programs across Gujarat, pan-India, and select international destinations.
    cta:
      label: Plan Your Experience
      href: /contact
    contentNotes: |
      Structure-only page—no real images at content pass. Hero uses stock brief until curated selects ready. Breadcrumb Home → Gallery.
    seoNotes: |
      Single H1 polo safari gallery. Category keywords in subheading.
    stockImage:
      keywords:
        - travel photography collage india outdoor
        - group adventure scenic landscape sunset
      orientation: landscape
      aspectRatio: "21:9"
      usage: hero
    replacementNote: Curated Polo Safari hero collage—minimum 4 category representatives.

  - id: category-filter-intro
    heading: Browse by experience
    subheading: Filter by trip type—assets loading from Polo Safari archive
    description: |
      Use category filters to explore corporate retreats, campus field studies, adventure treks, family holidays, Polo Forest heritage, drone aerials, events, awards, and video highlights. Each section below uses placeholder grids until verified Polo Safari photography is ingested.
    contentNotes: |
      Sticky filter bar—chips map to section anchors #gallery-corporate through #gallery-videos. Masonry layout sitewide. Lazy-load placeholders with skeleton state.
    seoNotes: |
      H2 polo safari photo categories. Filter labels match gallery-category entity names.
    stockImage:
      keywords:
        - photo gallery filter ui travel
        - image grid category navigation
      orientation: landscape
      aspectRatio: "16:9"
      usage: background
    replacementNote: N/A—UI chrome only; category photos replace per section below.

  - id: gallery-corporate
    heading: Corporate
    subheading: Offsites, team-building, and leadership retreats
    description: |
      Team challenges, resort offsites, and leadership away-days—placeholder grid until Polo Safari corporate archive is curated.
    entityRefs:
      - entityType: gallery-category
        entityId: gallery-corporate
    contentNotes: |
      Placeholder grid: 12 cells, 4:3 crops. Stock keywords from entity: corporate retreat, team building outdoor, leadership offsite india, group conference nature. Link /corporate.
    seoNotes: |
      H2 corporate retreat photos gujarat. Anchor #gallery-corporate.
    stockImage:
      keywords:
        - corporate retreat team building outdoor
        - leadership offsite india resort
      orientation: landscape
      aspectRatio: "4:3"
      usage: gallery
    replacementNote: Minimum 12 Polo Safari corporate images—Polo Forest, Udaipur, hill stations.

