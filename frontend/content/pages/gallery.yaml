$schema: ../schema/content-model.schema.json
id: gallery
slug: gallery
route: /gallery
title: Gallery
status: review
seo:
  title: Polo Safari Gallery | Corporate & Adventure Photos
  metaDescription: Explore Polo Safari moments—corporate offsites, school tours, Polo Forest heritage, drone aerials, and award ceremonies. Full gallery launching with verified assets.
  slug: gallery
  primaryKeyword: polo safari gallery
  secondaryKeywords:
    - corporate retreat photos gujarat
    - polo forest gallery images
    - school tour photography india
    - adventure trek photo gallery
    - drone travel photography
  internalLinks:
    - label: Corporate Retreats
      href: /corporate
    - label: Schools & Colleges
      href: /schools-colleges
    - label: India Tours
      href: /india
    - label: Travel Services
      href: /services
    - label: Awards
      href: /awards
  ctaSuggestions:
    - label: Plan Your Trip
      href: /contact
    - label: View Services
      href: /services
    - label: Read the Blog
