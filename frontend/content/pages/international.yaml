sections:
  - id: hero
    heading: International tours from Ahmedabad
    subheading: Southeast Asia · Middle East · Inbound cultural hosting
    description: |
      Polo Safari curates outbound journeys for Gujarat corporate incentives, family holidays, and cultural explorers—Singapore, Malaysia, Bali, Dubai, and Vietnam with end-to-end coordination from our Ahmedabad headquarters. We also host international guest groups in India, including multi-year Vietnamese partnerships since 2023.
    cta:
      label: Explore Destinations
      href: "#asia"
    contentNotes: |
      WF-GEO-HERO international variant. Breadcrumb Home → International. Anchor jump to #asia region grid. Dual value prop: outbound + inbound in hero subcopy. No Europe/Africa/Australia in hero—those are expansion placeholders below.
    seoNotes: |
      Single H1 international tours from ahmedabad. PDF-confirmed country names in first 120 words. Inbound hosting as differentiator keyword.
    stockImage:
      keywords:
        - international travel skyline southeast asia
        - group tour departure airport india
        - cultural exchange tourism global
      orientation: landscape
      aspectRatio: "21:9"
      usage: hero
    replacementNote: Polo Safari outbound group at airport or destination landmark; alternate inbound hosting shot at Ahmedabad heritage site.

  - id: asia
    heading: Asia
    subheading: Singapore · Malaysia · Bali · Vietnam — plus expansion destinations
    description: |
      Our strongest outbound corridor—city-state precision in Singapore, Kuala Lumpur and nature combos in Malaysia, wellness-led resort retreats in Bali, and heritage-rich Vietnam itineraries. Singapore–Malaysia twin-centre programs are popular with corporate and family groups from Gujarat.
    cta:
      label: Request Asia Itinerary
      href: /contact
    entityRefs:
      - entityType: destination
        entityId: singapore
      - entityType: destination
        entityId: malaysia
      - entityType: destination
        entityId: bali
      - entityType: destination
        entityId: vietnam
      - entityType: destination
        entityId: international-destination-asia
    contentNotes: |
      Card grid—4 PDF-confirmed destinations plus [International_Destination_Asia] placeholder labelled "Coming soon". Duration tags from entity summaries (multi-day). Link vietnam card to inbound section anchor #inbound-hosting for dual narrative.
    seoNotes: |
      H2 asia tour packages from gujarat. H3 per country. Singapore malaysia bali vietnam as supporting keywords.
    stockImage:
      keywords:
        - singapore malaysia bali vietnam travel collage
        - southeast asia tourism landmarks
      orientation: landscape
      aspectRatio: "16:9"
      usage: card
    replacementNote: Polo Safari outbound photography per Asia destination—minimum Singapore skyline group and Bali resort.

