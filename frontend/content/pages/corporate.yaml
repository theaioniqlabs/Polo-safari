  - id: faq-corporate
    heading: Corporate retreat questions
    subheading: HR, procurement, and leadership FAQs
    description: |
      Answers for team size, destinations, facilitation, MICE support, dietary needs, and how custom proposals differ from instant online booking.
    entityRefs:
      - entityType: theme
        entityId: corporate-retreats
      - entityType: theme
        entityId: team-building-leadership
      - entityType: award
        entityId: gt-season7-inbound-corporate-gujarat
    contentNotes: |
      Accordion Q&A (8 items):
      Q1: What group sizes can Polo Safari handle?
      A: Corporate programs typically range from 20 to 200 guests—scaled facilitation, meals, and transport. Share your headcount in an RFP on /corporate.
      Q2: Which destinations do you recommend for Gujarat offsites?
      A: Polo Forest, Udaipur, Jambughoda, Saputara, Jaisalmer, Diu, Daman, Matheran, Lonavala, and pan-India resort options—see /corporate and /india.
      Q3: Is team-building facilitation included?
      A: Yes—outdoor games, obstacle challenges, and debriefs led by trained facilitators. Leadership labs available for management cohorts.
      Q4: Can you support MICE-style conferences?
      A: Yes—AV coordination, breakout spaces, gala dinners, and delegate logistics for summits and annual meets. Scope in your proposal.
      Q5: How is a corporate retreat different from booking online?
      A: Corporate offsites are custom-quoted programs for 20+ guests. Standard experiences on /experiences use instant booking with login.
      Q6: How quickly will I receive a proposal?
      A: Our corporate team typically responds within 48 hours with itinerary options, pricing, and inclusions.
      Q7: Do you provide transport from Ahmedabad?
      A: Yes—coach and tempo traveller options from Ahmedabad and Gandhinagar, coordinated as part of your program.
      Q8: Can you accommodate vegetarian and Jain dietary requirements?
      A: Yes—dietary preferences are captured in your RFP and confirmed with resort and catering partners before travel.
    seoNotes: |
      H2 corporate offsite faq gujarat.
    stockImage:
      keywords:
        - hr corporate offsite planning meeting
        - team building corporate outdoor gujarat
      orientation: landscape
      aspectRatio: "16:9"
      usage: card

