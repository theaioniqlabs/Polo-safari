sections:
  - id: hero
    heading: India tour packages rooted in Gujarat
    subheading: Polo Forest heritage · Pan-India reach · Weekend to multi-day formats
    description: |
      From our Ahmedabad headquarters, Polo Safari designs experiential journeys across Gujarat, Rajasthan, Maharashtra, Himachal Pradesh, coastal union territories, and South India educational circuits—corporate offsites, school field studies, family holidays, and adventure programs with award-backed execution.
    cta:
      label: Explore by Theme
      href: /theme-tour-packages
    contentNotes: |
      WF-GEO-HERO. Breadcrumb Home → India. Optional India footprint map graphic (P.41) as background layer—not a destination list. Quick-filter chips: Gujarat, Corporate, Family, Adventure, 1-Day.
    seoNotes: |
      Single H1 india tour packages gujarat. Polo Forest in first 100 words. Secondary geo keywords in subheading without stuffing.
    stockImage:
      keywords:
        - india travel landscape gujarat heritage
        - polo forest aravalli panoramic aerial
        - pan india tour group experiential
      orientation: landscape
      aspectRatio: "21:9"
      usage: hero
    replacementNote: Polo Safari hero—mixed India collage or Polo Forest golden-hour group shot with Aravalli backdrop.

